<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
    margin: 0;
    padding: 0;
}

.container {
    width: 90%;
    max-width: 1100px;
    margin: 0 auto;
}

img.hidden {
    display: none;
}

.slider {
    margin: 32px 0;
}

.slider .slider-wrapper {
    width: 600px;
    margin: 0 auto;
    position: relative;
}



.slider-controls .fa-arrow-left {
    position: absolute;
    top: 50%;
    left: 10px;
    background-color: red;
    padding: 5px;
    cursor: pointer;
}

.slider-controls .fa-arrow-right {
    position: absolute;
    top: 50%;
    right: 10px;
    background-color: red;
    padding: 5px;
    cursor: pointer;
}

.slider-controls .fa-arrow-left:hover,
.slider-controls .fa-arrow-right:hover {

    color: white;
}
    </style>
</head>

<body>

    <main>
        <section class="slider">
            <div class="container">
                <div class="slider-wrapper">
                    <div class="slider-track">
                        <img src="https://picsum.photos/seed/2/600/400" alt="">
                        <img src="https://picsum.photos/seed/1/600/400" alt="">
                        <img src="https://picsum.photos/seed/3/600/400" alt="">
                    </div>

                    <div class="slider-controls">
                        <i class="fa-solid fa-arrow-left"></i>
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>

            </div>
        </section>
    </main>

<script>
    const imgs = document.querySelectorAll(".slider img")
const left = document.querySelector(".fa-arrow-left")
const right = document.querySelector(".fa-arrow-right")

let SliderNumber = 0;

imgs.forEach(img => {
    img.classList.add("hidden")
})

imgs[SliderNumber].classList.remove("hidden")

right.addEventListener("click", function () {

    imgs.forEach(img => {
        img.classList.add("hidden")
    })

    SliderNumber = SliderNumber + 1;

    imgs[SliderNumber].classList.remove("hidden")

})

left.addEventListener("click", function () {

    imgs.forEach(img => {
        img.classList.add("hidden")
    })

    SliderNumber = SliderNumber - 1;

    imgs[SliderNumber].classList.remove("hidden")

})
</script>
</body>

</html>
