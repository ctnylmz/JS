<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="temperature-converter">
        <div class="container">
            <div class="temperature-converter-wrapper">
                <div class="head-title">Hava Sıcaklığı Çevirici</div>

                <div class="temperature-converter-card">
                    <div class="title">Celsius:</div>
                    <input class="celsius" type="number" placeholder="Hava Kaç Derece?" >
                </div>

                <div class="temperature-converter-card">
                    <div class="title">Fahrenheit:</div>
                    <input class="fahrenheit" type="number" placeholder="Hava Kaç Derece?">
                </div>

                <div class="temperature-converter-card">
                    <div class="title">Kelvin:</div>
                    <input class="kelvin" type="number" placeholder="Hava Kaç Derece?">
                </div>

            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>

</html>
