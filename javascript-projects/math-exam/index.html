<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Exam</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <section class="exam-header">
            <div class="exam-title">Math Exam</div>
           
            <div class="exam-result hidden">
                <div class="exam-context">
                    <div class="exam-percentage">0%</div>
                    <div class="exam-label">Correct Answer Rate</div>
                </div>
                <div class="exam-description"></div>
            </div>
        </section>
    </header>

    <main>
        <section class="math-exam">
            <div class="container">
                <form id="math-exam-form">

                    <div class="math-exam-card">
                        <p>1) What is 3 + 5?</p>
                        <div class="form-check">
                            <input type="radio" name="q1" value="7" required>
                            <label>7</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" name="q1" value="8" required>
                            <label>8</label>
                        </div>
                    </div>

                    <div class="math-exam-card">
                        <p>2) What is 5 × 2?</p>
                        <div class="form-check">
                            <input type="radio" name="q2" value="10" required>
                            <label>10</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" name="q2" value="11" required>
                            <label>11</label>
                        </div>
                    </div>

                    <div class="math-exam-card">
                        <p>3) What is 12 ÷ 4?</p>
                        <div class="form-check">
                            <input type="radio" name="q3" value="2" required>
                            <label>2</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" name="q3" value="3" required>
                            <label>3</label>
                        </div>
                    </div>

                    <div class="math-exam-card">
                        <p>4) What is 5²?</p>
                        <div class="form-check">
                            <input type="radio" name="q4" value="20" required>
                            <label>20</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" name="q4" value="25" required>
                            <label>25</label>
                        </div>
                    </div>

                    <input type="submit" class="btn" value="Submit Exam">
                </form>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
