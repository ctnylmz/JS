<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="character">
            <div class="container">
                <div class="character-wrapper">
                    <div class="title">Your Message</div>
                    <textarea maxlength="50" class="message-input" placeholder="Please enter your message..."></textarea>
                    <div class="description">
                        <div class="total-count">Total Characters: 0</div>
                         <div class="remaining-count">Remaining Characters: 50</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
