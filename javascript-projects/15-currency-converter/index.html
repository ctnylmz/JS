<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <section class="currency-converter">
    <div class="container">
      <div class="currency-converter-wrapper">
        <div class="title">Currency Converter</div>

        <div class="top">
          <select class="fromCurrency">
            <option value="TL">TL</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="AUD">AUD</option>
            <option value="CAD">CAD</option>
            <option value="JPY">JPY</option>
          </select>

          <input class="amountInput" type="number" value="1" min="1">
        </div>

        <div class="footer">

          <select class="toCurrency">
            <option value="TL">TL</option>
            <option value="USD">USD</option>
            <option value="EUR">EUR</option>
            <option value="AUD">AUD</option>
            <option value="CAD">CAD</option>
            <option value="JPY">JPY</option>
          </select>

          <p class="resultText">0</p>

        </div>


        <p class="finalResult">0</p>
      </div>
    </div>
  </section>

  <script src="app.js"></script>
</body>

</html>
